<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>설비 보전 관리 - (주)태진다이텍</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6fa;--card:#ffffff;--card2:#f0f2f7;--text:#1a1a2e;--muted:#6b7280;--accent:#2563eb;--accent2:#3b82f6;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--border:#e0e3eb;--radius:12px}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}

.page{max-width:1000px;margin:0 auto;padding:12px 12px 40px}
.page-header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:16px;flex-wrap:wrap}
.page-header h2{font-size:18px;font-weight:800;color:var(--accent)}
.page-header .subtitle{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}

.header-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.year-selector{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:4px 6px}
.year-selector label{font-size:11px;color:var(--muted);font-weight:600;padding-left:4px}
.year-selector select{border:none;background:transparent;font-size:14px;font-weight:700;color:var(--accent);padding:4px 6px;cursor:pointer;outline:none}

.main-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.main-tab{padding:10px 20px;font-size:14px;border-radius:8px;font-weight:600;cursor:pointer;background:#fff;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.main-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.vol-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.vol-tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;background:#fff;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.vol-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.legend{display:flex;gap:16px;margin-bottom:14px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend .sym{font-size:16px}
.eq-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius);border:1px solid var(--border)}
.eq-table{width:100%;border-collapse:collapse;font-size:12px;min-width:750px}
.eq-table th{background:#f8f9fb;padding:8px 6px;font-weight:600;text-align:center;border:1px solid var(--border);position:sticky;top:0;white-space:nowrap;font-size:11px;color:var(--muted)}
.eq-table td{padding:7px 6px;text-align:center;border:1px solid var(--border);background:#fff}
.eq-table tr:hover td{background:#eef2ff}
.eq-table .eq-id{font-weight:700;color:var(--accent);white-space:nowrap}.eq-table .eq-name{text-align:left;white-space:nowrap}
.plan-cell{font-size:15px}
.plan-cell .plan{color:#2563eb}
.plan-cell .done{color:#16a34a}
.plan-cell .self{color:#dc2626}
.grade-a{color:#16a34a;font-weight:700}
.grade-b{color:#2563eb;font-weight:700}
.grade-c{color:#d97706;font-weight:700}
.grade-d{color:#ea580c;font-weight:700}
.grade-e{color:#dc2626;font-weight:700}
.notes-box{margin-top:16px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.notes-box h4{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.notes-box p{font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-line;min-height:20px}
.notes-box textarea{width:100%;min-height:80px;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:inherit;font-size:12px;resize:vertical;color:var(--text)}
.grade-legend{margin-top:12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:12px;color:var(--muted)}
.grade-legend b{color:var(--text)}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:flex-start;padding:30px 16px;overflow-y:auto}
.modal-box{background:#fff;border-radius:var(--radius);width:100%;max-width:500px;padding:24px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-box.wide{max-width:900px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-right:30px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-item{background:#f8f9fb;border-radius:8px;padding:10px 12px}
.detail-item label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.detail-item span{font-size:14px;font-weight:600}
.month-plan-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.mp-cell{background:#f8f9fb;border-radius:6px;padding:8px 4px;text-align:center}
.mp-cell .mp-month{font-size:10px;color:var(--muted);margin-bottom:2px}
.mp-cell .mp-val{font-size:18px}

.progress-bar{display:flex;gap:12px;margin-bottom:16px;padding:14px 16px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);align-items:center;flex-wrap:wrap}
.progress-bar .prog-label{font-size:13px;font-weight:700;color:var(--text)}
.prog-track{flex:1;min-width:120px;height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:6px;transition:width .3s}
.prog-text{font-size:12px;font-weight:700;min-width:60px;text-align:right}
.plan-cell.clickable{cursor:pointer;transition:background .15s}
.plan-cell.clickable:hover{background:#eef2ff!important}
.check-date{font-size:9px;color:var(--muted);display:block;margin-top:2px}

.mh-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;color:var(--text);background:#fff}
.mh-table{width:100%;border-collapse:collapse;font-size:12px}
.mh-table th{background:#f8f9fb;padding:10px 8px;font-weight:600;text-align:center;border:1px solid var(--border);font-size:11px;color:var(--muted);white-space:nowrap}
.mh-table td{padding:9px 8px;border:1px solid var(--border);background:#fff}
.mh-table tr:hover td{background:#eef2ff}
.mh-table tr{cursor:pointer}
.mh-badge{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:600;color:#fff;display:inline-block}
.mh-form-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1100;justify-content:center;align-items:flex-start;padding:30px 16px;overflow-y:auto}
.mh-form-box{background:#fff;border-radius:12px;width:100%;max-width:600px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mh-form-title{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mh-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mh-form-field{margin-bottom:12px}
.mh-form-field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px}
.mh-form-field textarea{resize:vertical;height:60px}
.mh-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.mh-summary-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
.mh-summary-card .num{font-size:22px;font-weight:800}
.mh-summary-card .label{font-size:11px;color:var(--muted);margin-top:2px}

.settings-section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.settings-section h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;color:var(--accent)}
.settings-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.btn{padding:8px 14px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:#f3f4f6}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 10px;font-size:11px}
.set-table{width:100%;border-collapse:collapse;font-size:12px}
.set-table th{background:#f8f9fb;padding:8px;font-weight:600;text-align:center;border:1px solid var(--border);font-size:11px;color:var(--muted);white-space:nowrap}
.set-table td{padding:7px 8px;border:1px solid var(--border);background:#fff;text-align:center}
.set-table td.lalign{text-align:left}
.set-table tr:hover td{background:#eef2ff}

.plan-edit-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:12px}
.pe-month{background:#f8f9fb;border-radius:8px;padding:8px 6px;text-align:center;border:1px solid var(--border)}
.pe-month-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px}
.pe-week-row{display:flex;gap:4px;justify-content:center;align-items:center;margin-top:4px}
.pe-week-row .wk-lbl{font-size:10px;color:var(--muted);min-width:26px}
.pe-week-row select{flex:1;padding:3px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:center;background:#fff}

.auto-badge{display:inline-block;background:#dbeafe;color:#1e40af;font-size:9px;padding:1px 6px;border-radius:3px;font-weight:700;margin-left:4px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="maintFormModal" class="mh-form-overlay" onclick="if(event.target===this)closeMaintForm()">
  <div class="mh-form-box" id="maintFormBody"></div>
</div>
<div id="setEqModal" class="mh-form-overlay" onclick="if(event.target===this)closeSetEq()">
  <div class="mh-form-box" id="setEqBody"></div>
</div>
<div id="setPlanModal" class="modal-overlay" onclick="if(event.target===this)closeSetPlan()">
  <div class="modal-box wide" id="setPlanBody"></div>
</div>

<div id="maintenancePage" class="page">
  <div class="page-header">
    <div>
      <h2 id="pageTitle">🔧 설비 보전 관리</h2>
      <div class="subtitle">(주)태진다이텍 · 프레스 설비 연간 보전 계획 · 점검이력 · 등급관리</div>
    </div>
    <div class="header-controls">
      <div class="year-selector">
        <label>년도</label>
        <select id="yearSelect" onchange="changeYear(this.value)"></select>
      </div>
    </div>
  </div>

  <div class="main-tabs">
    <div class="main-tab active" id="mainTab_plan" onclick="switchMainTab('plan')">📋 보전계획표</div>
    <div class="main-tab" id="mainTab_history" onclick="switchMainTab('history')">📝 보전이력관리</div>
    <div class="main-tab" id="mainTab_settings" onclick="switchMainTab('settings')">⚙️ 설정</div>
  </div>

  <div id="view_plan">
    <div class="vol-tabs" id="volTabs"></div>
    <div class="legend">
      <span><span class="sym" style="color:#2563eb">□</span> 계획</span>
      <span><span class="sym" style="color:#16a34a">▣</span> 점검완료</span>
      <span><span class="sym" style="color:#dc2626">■</span> 자체점검</span>
      <span style="color:var(--muted);font-size:11px">| □ 클릭 → 점검완료 + 이력 자동등록</span>
    </div>
    <div id="eqContent"></div>
  </div>

  <div id="view_history" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end">
      <div style="min-width:130px"><label style="font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px">설비</label>
        <select id="mh_filter_eq" class="mh-input" onchange="renderMaintHistory()"><option value="">전체</option></select>
      </div>
      <div style="min-width:120px"><label style="font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px">보전유형</label>
        <select id="mh_filter_type" class="mh-input" onchange="renderMaintHistory()">
          <option value="">전체</option>
          <option>정기보전</option><option>고장보전</option><option>예방보전</option><option>개선보전</option><option>자체점검</option>
        </select>
      </div>
      <div style="min-width:120px"><label style="font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px">시작일</label>
        <input type="date" id="mh_filter_from" class="mh-input" onchange="renderMaintHistory()">
      </div>
      <div style="min-width:120px"><label style="font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px">종료일</label>
        <input type="date" id="mh_filter_to" class="mh-input" onchange="renderMaintHistory()">
      </div>
      <button onclick="openMaintForm()" class="btn btn-primary">+ 이력등록</button>
    </div>
    <div id="maintHistContent"></div>
  </div>

  <div id="view_settings" style="display:none">
    <div class="settings-section">
      <h3>📅 년도 관리</h3>
      <div class="settings-actions">
        <button class="btn btn-primary" onclick="createNewYear()">+ 새 년도 추가</button>
        <button class="btn btn-secondary" onclick="copyYearData()">📋 다른 년도에서 복사</button>
        <button class="btn btn-danger btn-sm" onclick="deleteCurrentYear()">🗑 현재 년도 삭제</button>
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        • 현재 <b style="color:var(--accent)" id="curYearLabel"></b>년을 편집하고 있습니다.<br>
        • 년도별로 <b>설비목록 · 월별계획 · 점검완료</b>가 독립 관리됩니다.<br>
        • 보전이력은 전 년도 공통으로 저장됩니다.
      </div>
    </div>

    <div class="settings-section">
      <h3>🏭 <span id="yearLabelEq"></span>년 설비 관리 <span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:auto">총 <span id="eqCount">0</span>대</span></h3>
      <div class="settings-actions">
        <button class="btn btn-primary" onclick="openSetEq()">+ 설비 추가</button>
        <button class="btn btn-secondary" onclick="exportEquipment()">📥 엑셀 다운로드</button>
        <button class="btn btn-secondary" onclick="document.getElementById('eqImportFile').click()">📤 엑셀 업로드</button>
        <input type="file" id="eqImportFile" accept=".xlsx,.xls" style="display:none" onchange="importEquipment(event)">
      </div>
      <div style="overflow-x:auto">
        <table class="set-table" id="equipMasterTable"></table>
      </div>
    </div>

    <div class="settings-section">
      <h3>💾 데이터 관리</h3>
      <div class="settings-actions">
        <button class="btn btn-secondary" onclick="exportAllData()">📦 전체 백업 다운로드</button>
        <button class="btn btn-secondary" onclick="document.getElementById('dataImportFile').click()">📥 백업 복원</button>
        <input type="file" id="dataImportFile" accept=".json" style="display:none" onchange="importAllData(event)">
      </div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6">
        모든 데이터(년도별 설비/계획/점검 + 보전이력)를 JSON 파일로 백업/복원할 수 있습니다.
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div id="detailBody"></div>
  </div>
</div>

const LS = {
  EQUIP: y => `eq_master_${y}`,        // 년도별 설비목록
  CUR_YEAR: 'cur_year_v3',
  PLAN: y => `eq_plans_${y}`,
  CHECK: y => `eq_checks_${y}`,
  NOTES: y => `eq_notes_${y}`,
  HISTORY: 'maint_history',
  YEARS: 'eq_years_list'
};

function migrateOldData(){
  // 이미 v3 이상이 있다면 스킵
  if(localStorage.getItem(LS.EQUIP(2026))) return;
  // 이전 버전(v2)에서 equip_master_v2가 있으면 2026년으로 이관
  const oldMaster = localStorage.getItem('equip_master_v2');
  if(oldMaster){
    localStorage.setItem(LS.EQUIP(2026), oldMaster);
  } else {
    localStorage.setItem(LS.EQUIP(2026), JSON.stringify(DEFAULT_EQUIP));
  }
  // 기존 계획/점검/특이사항 이관 또는 초기값
  if(!localStorage.getItem(LS.PLAN(2026))){
    localStorage.setItem(LS.PLAN(2026), JSON.stringify(DEFAULT_PLAN_2026));
  }
  const oldChecks = JSON.parse(localStorage.getItem('eq_checks')||'{}');
  if(Object.keys(oldChecks).length && !localStorage.getItem(LS.CHECK(2026))){
    localStorage.setItem(LS.CHECK(2026), JSON.stringify(oldChecks));
  }
  if(!localStorage.getItem(LS.NOTES(2026))){
    localStorage.setItem(LS.NOTES(2026), DEFAULT_NOTES);
  }
  if(!localStorage.getItem(LS.YEARS)){
    localStorage.setItem(LS.YEARS, JSON.stringify([2026]));
  }
  if(!localStorage.getItem(LS.CUR_YEAR)){
    localStorage.setItem(LS.CUR_YEAR, '2026');
  }
}

function getEquip(y){return JSON.parse(localStorage.getItem(LS.EQUIP(y))||'[]')}
function setEquip(y,arr){localStorage.setItem(LS.EQUIP(y), JSON.stringify(arr))}
function getYears(){return JSON.parse(localStorage.getItem(LS.YEARS)||'[2026]').sort((a,b)=>b-a)}
function setYears(arr){localStorage.setItem(LS.YEARS, JSON.stringify(arr))}
function getCurYear(){return parseInt(localStorage.getItem(LS.CUR_YEAR)||'2026')}
function setCurYear(y){localStorage.setItem(LS.CUR_YEAR, String(y))}
function getPlan(y){return JSON.parse(localStorage.getItem(LS.PLAN(y))||'{}')}
function setPlan(y,p){localStorage.setItem(LS.PLAN(y), JSON.stringify(p))}
function getChecks(y){return JSON.parse(localStorage.getItem(LS.CHECK(y))||'{}')}
function setChecks(y,c){localStorage.setItem(LS.CHECK(y), JSON.stringify(c))}
function getNotes(y){return localStorage.getItem(LS.NOTES(y))||''}

function getHistory(){return JSON.parse(localStorage.getItem(LS.HISTORY)||'[]')}

function updatePageTitle(){
  document.getElementById('pageTitle').textContent = `🔧 ${currentYear} 설비 보전 관리`;
  const cy = document.getElementById('curYearLabel');
  if(cy) cy.textContent = currentYear;
  const yl = document.getElementById('yearLabelEq');
  if(yl) yl.textContent = currentYear;
}

function reloadYearData(){
  EQUIP = getEquip(currentYear);
  currentPlan = getPlan(currentYear);
  checkData = getChecks(currentYear);
  currentNotes = getNotes(currentYear);
}

function renderYearSelect(){
  const sel = document.getElementById('yearSelect');
  const years = getYears();
  sel.innerHTML = years.map(y=>`<option value="${y}"${y===currentYear?' selected':''}>${y}년</option>`).join('');
}

function changeYear(y){
  currentYear = parseInt(y);
  setCurYear(currentYear);
  reloadYearData();
  updatePageTitle();
  if(currentMainTab==='plan') renderVolTabs();
  if(currentMainTab==='settings') renderSettings();
}

function createNewYear(){
  const y = prompt('추가할 년도를 입력하세요 (예: 2027)');
  if(!y) return;
  const yy = parseInt(y);
  if(isNaN(yy)||yy<2000||yy>2100){alert('올바른 년도를 입력하세요.');return}
  const years = getYears();
  if(years.includes(yy)){alert('이미 존재하는 년도입니다.');return}

  // 이전 년도 설비목록 복사 여부 확인
  const copyEq = confirm(`${yy}년을 생성합니다.\n\n현재 ${currentYear}년의 설비목록(${EQUIP.length}대)을 복사해올까요?\n\n[확인] 설비 복사 (계획은 비어있음)\n[취소] 빈 상태로 시작`);

  years.push(yy);
  setYears(years);
  if(copyEq){
    setEquip(yy, JSON.parse(JSON.stringify(EQUIP)));
  } else {
    setEquip(yy, []);
  }
  setPlan(yy, {});
  setChecks(yy, {});
  setNotes(yy, '');

  currentYear = yy;
  setCurYear(yy);
  reloadYearData();
  renderYearSelect();
  updatePageTitle();
  alert(`${yy}년이 생성되었습니다.${copyEq?`\n설비 ${EQUIP.length}대가 복사되었습니다.\n설정 > 설비 관리에서 월별 계획을 입력하세요.`:'\n설정에서 설비를 추가하거나 "다른 년도에서 복사"를 이용하세요.'}`);
  switchMainTab('settings');
}

function copyYearData(){
  const years = getYears().filter(y=>y!==currentYear);
  if(!years.length){alert('복사할 다른 년도가 없습니다.');return}
  const src = prompt(`현재 ${currentYear}년에 복사할 원본 년도를 입력하세요.\n사용 가능: ${years.join(', ')}`, years[0]);
  if(!src) return;
  const sy = parseInt(src);
  if(!years.includes(sy)){alert('존재하지 않는 년도입니다.');return}
  const what = prompt(`무엇을 복사하시겠습니까?\n1 = 설비목록만\n2 = 설비목록 + 월별계획\n3 = 모두 (설비+계획+특이사항)\n\n숫자 입력:`, '3');
  if(!['1','2','3'].includes(what)) return;
  if(!confirm(`${sy}년의 데이터를 ${currentYear}년으로 복사합니다.\n현재 ${currentYear}년 내용은 덮어씌워집니다. (점검완료/보전이력은 유지)\n계속할까요?`)) return;

  const srcEq = getEquip(sy);
  setEquip(currentYear, JSON.parse(JSON.stringify(srcEq)));
  if(what==='2'||what==='3'){
    setPlan(currentYear, JSON.parse(JSON.stringify(getPlan(sy))));
  }
  if(what==='3'){
    setNotes(currentYear, getNotes(sy));
  }
  reloadYearData();
  alert('복사 완료');
  if(currentMainTab==='plan') renderVolTabs();
  if(currentMainTab==='settings') renderSettings();
}

function deleteCurrentYear(){
  const years = getYears();
  if(years.length<=1){alert('최소 1개의 년도는 남겨둬야 합니다.');return}
  if(!confirm(`${currentYear}년의 설비목록, 계획, 점검완료 데이터를 모두 삭제하시겠습니까?\n(보전이력은 유지됩니다.)`)) return;
  localStorage.removeItem(LS.EQUIP(currentYear));
  localStorage.removeItem(LS.PLAN(currentYear));
  localStorage.removeItem(LS.CHECK(currentYear));
  localStorage.removeItem(LS.NOTES(currentYear));
  const nyears = years.filter(y=>y!==currentYear);
  setYears(nyears);
  currentYear = nyears[0];
  setCurYear(currentYear);
  reloadYearData();
  renderYearSelect();
  updatePageTitle();
  if(currentMainTab==='plan') renderVolTabs();
  if(currentMainTab==='settings') renderSettings();
}

function switchMainTab(tab){
  currentMainTab = tab;
  ['plan','history','settings'].forEach(t=>{
    document.getElementById('view_'+t).style.display = t===tab?'':'none';
    document.getElementById('mainTab_'+t).className = 'main-tab'+(t===tab?' active':'');
  });
  if(tab==='plan') renderVolTabs();
  if(tab==='history'){initMaintHistory();renderMaintHistory()}
  if(tab==='settings') renderSettings();
}

function renderVolTabs(){
  const tabs = document.getElementById('volTabs');
  const vols = [...new Set(EQUIP.map(e=>e.vol))].sort((a,b)=>a-b);
  let h = `<div class="vol-tab ${currentVol===0?'active':''}" onclick="currentVol=0;renderVolTabs()">전체</div>`;
  vols.forEach(v=>h+=`<div class="vol-tab ${currentVol===v?'active':''}" onclick="currentVol=${v};renderVolTabs()">${v}권</div>`);
  tabs.innerHTML = h;
  renderEqTable();
}

function getPlanFor(eqId){return currentPlan[eqId] || {}}
function getCheckKey(eqId,month,week){return `${eqId}_${month}_${week}`}

function toggleCheck(eqId,month,week,event){
  event.stopPropagation();
  const key = getCheckKey(eqId,month,week);
  if(checkData[key]){
    if(confirm('점검 완료를 취소하시겠습니까?\n(자동 생성된 보전이력도 함께 삭제됩니다.)')){
      const autoId = checkData[key].autoHistoryId;
      if(autoId){
        maintHistory = maintHistory.filter(h=>h.id!==autoId);
        setHistory(maintHistory);
      }
      delete checkData[key];
      setChecks(currentYear, checkData);
      renderEqTable();
    }
  }else{
    openAutoHistoryForm(eqId, month, week);
  }
}

function confirmCheckOnly(eqId, month, week){
  const key = getCheckKey(eqId,month,week);
  checkData[key] = {date: new Date().toISOString().slice(0,10), by:'', autoHistoryId: null};
  setChecks(currentYear, checkData);
  closeMaintForm();
  renderEqTable();
}

function saveAutoHistory(eqId, month, week){
  const date = document.getElementById('af_date').value;
  const type = document.getElementById('af_type').value;
  const worker = document.getElementById('af_worker').value.trim();
  const hours = parseFloat(document.getElementById('af_hours').value)||0;
  const work = document.getElementById('af_work').value.trim();
  const result = document.getElementById('af_result').value;
  const cost = parseInt(document.getElementById('af_cost').value)||0;
  const parts = document.getElementById('af_parts').value.trim();
  const note = document.getElementById('af_note').value.trim();

  if(!date){alert('점검일자는 필수입니다.');return}
  if(!worker){alert('담당자는 필수입니다.');document.getElementById('af_worker').focus();return}
  if(!work){alert('점검 내용은 필수입니다.');document.getElementById('af_work').focus();return}

  const histRec = {
    id: _mhNextId++,
    eqId, date, type,
    issue:'',
    work, worker, hours, parts, cost, result,
    note: note || `${currentYear}년 ${month}월 ${week==='w2'?'2주':'4주'}차 계획 점검`,
    autoGenerated: true,
    planYear: currentYear,
    planMonth: month,
    planWeek: week
  };
  maintHistory.push(histRec);
  setHistory(maintHistory);

  const key = getCheckKey(eqId,month,week);
  checkData[key] = {date, by:worker, autoHistoryId: histRec.id};
  setChecks(currentYear, checkData);

  closeMaintForm();
  renderEqTable();
}

function getCompletionStats(){
  let total=0,done=0;
  EQUIP.forEach(eq=>{
    const plan = getPlanFor(eq.id);
    for(let m=1;m<=12;m++){
      const p = plan[String(m)];
      if(p&&p.w2){total++;if(checkData[getCheckKey(eq.id,m,'w2')])done++}
      if(p&&p.w4){total++;if(checkData[getCheckKey(eq.id,m,'w4')])done++}
    }
  });
  return{total,done,pct:total?Math.round(done/total*100):0};
}

function renderEqTable(){
  const list = currentVol===0 ? EQUIP : EQUIP.filter(e=>e.vol===currentVol);
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const stats = getCompletionStats();
  const barColor = stats.pct>=80?'var(--green)':stats.pct>=50?'#d97706':'var(--red)';

  let h = `<div class="progress-bar">
    <span class="prog-label">📋 ${currentYear}년 점검 진행률</span>
    <div class="prog-track"><div class="prog-fill" style="width:${stats.pct}%;background:${barColor}"></div></div>
    <span class="prog-text" style="color:${barColor}">${stats.done}/${stats.total} (${stats.pct}%)</span>
  </div>`;

  h += `<div class="eq-table-wrap"><table class="eq-table"><thead><tr>
    <th rowspan="2">설비번호</th><th rowspan="2">설비명</th>`;
  months.forEach(m=>h+=`<th colspan="2">${m}</th>`);
  h += `<th rowspan="2">등급</th><th rowspan="2">년식</th><th rowspan="2">진행</th></tr><tr>`;
  for(let i=0;i<12;i++) h+=`<th>2주</th><th>4주</th>`;
  h += `</tr></thead><tbody>`;

  if(!list.length){
    h += `<tr><td colspan="30" style="padding:40px;text-align:center;color:var(--muted)">등록된 설비가 없습니다.<br><br><button onclick="switchMainTab('settings')" class="btn btn-primary">⚙️ 설정으로 이동</button></td></tr>`;
  }else{
    list.forEach(eq=>{
      const plan = getPlanFor(eq.id);
      const gc = eq.grade?(eq.grade.startsWith('A')?'grade-a':eq.grade.startsWith('B')?'grade-b':eq.grade.startsWith('C')?'grade-c':eq.grade.startsWith('D')?'grade-d':'grade-e'):'';
      let eqTotal=0,eqDone=0;
      for(let m=1;m<=12;m++){
        const p = plan[String(m)];
        if(p&&p.w2){eqTotal++;if(checkData[getCheckKey(eq.id,m,'w2')])eqDone++}
        if(p&&p.w4){eqTotal++;if(checkData[getCheckKey(eq.id,m,'w4')])eqDone++}
      }
      const eqPct = eqTotal?Math.round(eqDone/eqTotal*100):0;

      h += `<tr>
        <td class="eq-id" style="cursor:pointer" onclick="openDetail('${eq.id}')">${eq.id}</td>
        <td class="eq-name" style="cursor:pointer" onclick="openDetail('${eq.id}')">${eq.name}</td>`;
      for(let m=1;m<=12;m++){
        const p = plan[String(m)];
        ['w2','w4'].forEach(w=>{
          const v = p?p[w]:'';
          if(v){
            const k = getCheckKey(eq.id,m,w);
            const isDone = !!checkData[k];
            const display = isDone?'<span class="done">▣</span>':sym(v);
            const dateStr = isDone?`<span class="check-date">${checkData[k].date}</span>`:'';
            h += `<td class="plan-cell clickable" onclick="toggleCheck('${eq.id}',${m},'${w}',event)" title="${isDone?'점검완료 '+checkData[k].date+' (클릭 취소)':'클릭하여 점검완료 + 이력등록'}">${display}${dateStr}</td>`;
          }else{
            h += `<td class="plan-cell"></td>`;
          }
        });
      }
      const eqColor = eqPct>=100?'var(--green)':eqPct>=50?'#d97706':'var(--muted)';
      h += `<td class="${gc}">${eq.grade||''}</td><td>${eq.year||''}</td>
        <td style="font-size:11px;font-weight:700;color:${eqColor}">${eqDone}/${eqTotal}</td></tr>`;
    });
  }
  h += `</tbody></table></div>`;
  h += `<div class="notes-box"><h4>
    <span>📝 ${currentYear}년 특이사항</span>
    <button class="btn btn-sm btn-secondary" onclick="editNotes()">✏️ 편집</button>
  </h4><p id="notesDisplay">${currentNotes||'<span style="color:var(--muted)">특이사항이 없습니다. 편집 버튼을 눌러 추가하세요.</span>'}</p></div>`;
  h += `<div class="grade-legend"><b>등급기준:</b> A: 1년~10년 &nbsp;|&nbsp; B: 11년~20년 &nbsp;|&nbsp; C: 21년~30년 &nbsp;|&nbsp; D: 31년~40년 &nbsp;|&nbsp; E: 41년 이상 &nbsp;|&nbsp; <span style="color:var(--blue)">□</span> 클릭 → <span style="color:var(--green)">▣</span> 점검완료 + 보전이력 자동등록</div>`;
  document.getElementById('eqContent').innerHTML = h;
}

function sym(v){

  if(v==='▣') return '<span class="done">▣</span>';
  if(v==='■') return '<span class="self">■</span>';

}

  h += `<div class="month-plan-grid">`;
  for(let m=1;m<=12;m++){
    const p = plan[String(m)];
    if(!p){h += `<div class="mp-cell"><div class="mp-month">${m}월</div><div class="mp-val" style="color:var(--muted)">-</div></div>`;continue}
    let cellH = `<div class="mp-month">${m}월</div>`;
    ['w2','w4'].forEach(w=>{
      if(!p[w]) return;
      const key = getCheckKey(eq.id,m,w);

      const label = w==='w2'?'2주':'4주';
      if(isDone){
        cellH += `<div style="cursor:pointer;padding:4px;border-radius:4px;background:#dcfce7;margin-top:3px" onclick="closeDetail();toggleCheck('${eq.id}',${m},'${w}',event)">
          <span class="done" style="font-size:20px">▣</span><br>
          <span style="font-size:9px;color:var(--green);font-weight:600">${label} 완료</span><br>
          <span style="font-size:9px;color:var(--muted)">${checkData[key].date}</span>
        </div>`;
      }else{
        const symStr = p[w]==='■'?'<span class="self" style="font-size:20px">■</span>':'<span class="plan" style="font-size:20px">□</span>';
        cellH += `<div style="cursor:pointer;padding:4px;border-radius:4px;margin-top:3px" onclick="closeDetail();toggleCheck('${eq.id}',${m},'${w}',event)">
          ${symStr}<br>
          <span style="font-size:9px;color:var(--muted)">${label} 미실시</span>
        </div>`;
      }
    });
    h += `<div class="mp-cell">${cellH}</div>`;
  }
  h += `</div>`;
  document.getElementById('detailBody').innerHTML = h;
  document.getElementById('detailModal').style.display = 'flex';
}

function saveEquip(editIdx){
  const data = {
    vol: parseInt(document.getElementById('se_vol').value),
    id: document.getElementById('se_id').value.trim(),
    name: document.getElementById('se_name').value.trim(),
    grade: document.getElementById('se_grade').value,
    year: document.getElementById('se_year').value.trim(),
    improvement: document.getElementById('se_imp').value.trim()
  };
  if(!data.id||!data.name){alert('설비번호와 설비명은 필수입니다.');return}
  if(editIdx!==null){
    const oldId = EQUIP[editIdx].id;
    if(oldId !== data.id){
      if(EQUIP.some((e,i)=>i!==editIdx&&e.id===data.id)){alert('이미 존재하는 설비번호입니다.');return}
      // 현재 년도 계획/점검 ID 갱신
      if(currentPlan[oldId]){currentPlan[data.id]=currentPlan[oldId]; delete currentPlan[oldId]; setPlan(currentYear,currentPlan)}
      const newChecks = {};
      Object.keys(checkData).forEach(k=>{
        if(k.startsWith(oldId+'_')) newChecks[data.id+k.slice(oldId.length)] = checkData[k];
        else newChecks[k] = checkData[k];
      });
      checkData = newChecks;
      setChecks(currentYear, checkData);
      // 이력의 eqId도 현재 년도 플래그된 것만 갱신 (다른 년도는 각 년도에서 수정)
      maintHistory.forEach(h=>{
        if(h.eqId===oldId && (!h.planYear||h.planYear===currentYear)) h.eqId=data.id;
      });
      setHistory(maintHistory);
    }
    EQUIP[editIdx] = data;
  }else{
    if(EQUIP.some(e=>e.id===data.id)){alert('이미 존재하는 설비번호입니다.');return}
    EQUIP.push(data);
  }
  setEquip(currentYear, EQUIP);
  closeSetEq();
  renderSettings();
}

function deleteEquip(idx){
  const eq = EQUIP[idx];
  if(!confirm(`${currentYear}년 목록에서 ${eq.id} ${eq.name}을(를) 삭제하시겠습니까?\n(해당 년도의 계획/점검 데이터도 함께 삭제됩니다. 보전이력과 다른 년도 데이터는 유지됩니다.)`)) return;
  EQUIP.splice(idx,1);
  setEquip(currentYear, EQUIP);
  delete currentPlan[eq.id];
  setPlan(currentYear, currentPlan);
  Object.keys(checkData).forEach(k=>{if(k.startsWith(eq.id+'_')) delete checkData[k]});
  setChecks(currentYear, checkData);
  renderSettings();
}

}

function fillPlanPattern(pattern, symbol){
  const patterns = {quarter:[3,6,9,12], third:[1,5,9], half:[6,12]};
  for(let m=1;m<=12;m++){
    const s2 = document.getElementById(`pe_${m}_w2`);
    const s4 = document.getElementById(`pe_${m}_w4`);
    if(pattern==='clear'){s2.value='';s4.value=''}
    else if(patterns[pattern]&&patterns[pattern].includes(m)){s2.value='';s4.value=symbol}
    else{s2.value='';s4.value=''}
  }
}

function closeSetPlan(){document.getElementById('setPlanModal').style.display='none'}

function savePlan(eqId){
  const newPlan = {};
  for(let m=1;m<=12;m++){
    const w2 = document.getElementById(`pe_${m}_w2`).value;
    const w4 = document.getElementById(`pe_${m}_w4`).value;
    if(w2||w4) newPlan[String(m)] = {w2,w4};
  }
  currentPlan[eqId] = newPlan;
  setPlan(currentYear, currentPlan);
  closeSetPlan();
  renderSettings();
}

function exportEquipment(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로드 중...');return}
  const rows = EQUIP.map(e=>({
    '권':e.vol,'설비번호':e.id,'설비명':e.name,'등급/횟수':e.grade,'년식':e.year,'비고':e.improvement
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `설비마스터_${currentYear}`);
  XLSX.writeFile(wb, `설비마스터_${currentYear}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function importEquipment(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const wb = XLSX.read(e.target.result,{type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);
      if(!rows.length){alert('데이터가 없습니다.');return}
      if(!confirm(`${currentYear}년에 ${rows.length}건의 설비를 업로드합니다.\n(기존 ${currentYear}년 설비목록은 대체됩니다. 계획/점검/이력은 유지)`)) return;
      const newEq = rows.map(r=>({
        vol: parseInt(r['권'])||1,
        id: String(r['설비번호']||'').trim(),
        name: String(r['설비명']||'').trim(),
        grade: String(r['등급/횟수']||'B/3회'),
        year: String(r['년식']||''),
        improvement: String(r['비고']||'')
      })).filter(e=>e.id&&e.name);
      EQUIP = newEq;
      setEquip(currentYear, EQUIP);
      renderSettings();
      alert('업로드 완료');
    }catch(err){alert('엑셀 읽기 실패: '+err.message)}
  };
  reader.readAsArrayBuffer(file);
  ev.target.value = '';
}

function exportAllData(){
  const data = {
    version: 3,
    exportDate: new Date().toISOString(),
    years: getYears(),
    equip: {},
    plans: {},
    checks: {},
    notes: {},
    history: getHistory()
  };
  getYears().forEach(y=>{
    data.equip[y] = getEquip(y);
    data.plans[y] = getPlan(y);
    data.checks[y] = getChecks(y);
    data.notes[y] = getNotes(y);
  });
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `설비보전_백업_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importAllData(ev){
  const file = ev.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.years){alert('올바른 백업 파일이 아닙니다.');return}
      if(!confirm(`백업을 복원하시겠습니까?\n- 년도: ${data.years.join(', ')}\n- 이력: ${(data.history||[]).length}건\n\n현재 모든 데이터가 대체됩니다.`)) return;
      setYears(data.years);
      data.years.forEach(y=>{
        if(data.equip&&data.equip[y]) setEquip(y, data.equip[y]);
        // v2 백업 호환: equip이 공통이었다면
        else if(data.equip&&Array.isArray(data.equip)) setEquip(y, data.equip);
        if(data.plans&&data.plans[y]) setPlan(y, data.plans[y]);
        if(data.checks&&data.checks[y]) setChecks(y, data.checks[y]);
        if(data.notes&&data.notes[y]) setNotes(y, data.notes[y]);
      });
      setHistory(data.history||[]);
      currentYear = data.years[0];
      setCurYear(currentYear);
      reloadYearData();
      maintHistory = getHistory();
      _mhNextId = maintHistory.length?Math.max(...maintHistory.map(h=>h.id||0))+1:1;
      renderYearSelect();
      updatePageTitle();
      renderSettings();
      alert('복원 완료');
    }catch(err){alert('복원 실패: '+err.message)}
  };
  reader.readAsText(file);
  ev.target.value = '';
}

// ================================================================
// 보전이력관리
// ================================================================
const MH_TYPES = ['정기보전','고장보전','예방보전','개선보전','자체점검'];
const MH_RESULTS = ['정상복구','임시조치','외주의뢰','부품대기','미완료'];
const MH_TYPE_COLORS = {'정기보전':'#2563eb','고장보전':'#dc2626','예방보전':'#16a34a','개선보전':'#d97706','자체점검':'#6b7280'};

function initMaintHistory(){
  // 모든 년도의 설비를 합쳐서 드롭다운 생성 (중복 제거)
  const allEq = {};
  getYears().forEach(y=>{
    getEquip(y).forEach(e=>{allEq[e.id] = e.name});
  });
  const sel = document.getElementById('mh_filter_eq');
  sel.innerHTML = '<option value="">전체</option>' +
    Object.keys(allEq).sort().map(id=>`<option value="${id}">${id} ${allEq[id]}</option>`).join('');
  if(!document.getElementById('mh_filter_to').value){
    document.getElementById('mh_filter_to').value = new Date().toISOString().slice(0,10);
  }
}

function getEqName(eqId){
  for(const y of getYears()){
    const e = getEquip(y).find(x=>x.id===eqId);
    if(e) return e.name;
  }
  return '';
}

function renderMaintHistory(){
  const fEq = document.getElementById('mh_filter_eq').value;
  const fType = document.getElementById('mh_filter_type').value;
  const fFrom = document.getElementById('mh_filter_from').value;
  const fTo = document.getElementById('mh_filter_to').value;

  const filtered = maintHistory.filter(h=>{
    if(fEq&&h.eqId!==fEq) return false;
    if(fType&&h.type!==fType) return false;
    if(fFrom&&(h.date||'')<fFrom) return false;
    if(fTo&&(h.date||'')>fTo) return false;
    return true;
  }).sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const totalCost = filtered.reduce((a,b)=>a+(b.cost||0),0);
  const totalHours = filtered.reduce((a,b)=>a+(b.hours||0),0);
  const breakdowns = filtered.filter(h=>h.type==='고장보전').length;
  const autoCount = filtered.filter(h=>h.autoGenerated).length;

  let h = `<div class="mh-summary">
    <div class="mh-summary-card"><div class="num" style="color:var(--accent)">${filtered.length}</div><div class="label">총 보전건수</div></div>
    <div class="mh-summary-card"><div class="num" style="color:var(--red)">${breakdowns}</div><div class="label">고장보전</div></div>
    <div class="mh-summary-card"><div class="num" style="color:var(--blue)">${totalHours.toFixed(1)}</div><div class="label">총 소요시간(h)</div></div>
    <div class="mh-summary-card"><div class="num" style="color:var(--green)">${(totalCost/10000).toFixed(0)}</div><div class="label">총 비용(만원)</div></div>
  </div>`;
  if(autoCount>0){
    h += `<div style="font-size:11px;color:var(--muted);margin-bottom:10px">💡 자동등록 ${autoCount}건 포함 (계획표 점검완료 시 생성)</div>`;
  }

  if(!filtered.length){
    h += `<div style="text-align:center;padding:40px;color:var(--muted)">등록된 보전이력이 없습니다.<br><br><button onclick="openMaintForm()" class="btn btn-primary">+ 첫 이력 등록하기</button></div>`;
  }else{
    h += `<div style="overflow-x:auto;border:1px solid var(--border);border-radius:8px"><table class="mh-table"><thead><tr>
      <th>No</th><th>보전일자</th><th>설비</th><th>보전유형</th><th>고장/이상내용</th><th>보전내용</th><th>담당자</th><th>소요(h)</th><th>교체부품</th><th>비용</th><th>결과</th><th></th>
    </tr></thead><tbody>`;
    filtered.forEach((r,i)=>{
      const tc = MH_TYPE_COLORS[r.type]||'#666';
      const eqName = getEqName(r.eqId);
      h += `<tr onclick="openMaintForm(${r.id})">
        <td style="text-align:center;color:var(--muted)">${i+1}</td>
        <td style="white-space:nowrap">${r.date||''}</td>
        <td style="font-weight:600;color:var(--accent);white-space:nowrap">${r.eqId}${eqName?' '+eqName:''}${r.autoGenerated?'<span class="auto-badge">자동</span>':''}</td>
        <td><span class="mh-badge" style="background:${tc}">${r.type}</span></td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.issue||'-'}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.work||'-'}</td>
        <td>${r.worker||'-'}</td>
        <td style="text-align:right">${r.hours||'-'}</td>
        <td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.parts||'-'}</td>
        <td style="text-align:right">${r.cost?(r.cost/10000).toFixed(1)+'만':'-'}</td>
        <td><span class="mh-badge" style="background:${r.result==='정상복구'?'var(--green)':r.result==='미완료'?'var(--red)':'#6b7280'}">${r.result||'-'}</span></td>
        <td style="text-align:center"><button onclick="event.stopPropagation();deleteMaintHistory(${r.id})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:14px">🗑</button></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    h += `<div style="margin-top:10px;text-align:right"><button onclick="exportMaintHistory()" class="btn btn-secondary btn-sm">📥 엑셀 다운로드</button></div>`;
  }
  document.getElementById('maintHistContent').innerHTML = h;
}

function openMaintForm(editId){
  const isEdit = editId!==undefined;
  const r = isEdit?maintHistory.find(h=>h.id===editId):{};
  // 현재 년도 설비를 기본으로 보여주되, 이력의 설비가 다른 년도꺼면 추가
  const allEq = {};
  getYears().forEach(y=>{getEquip(y).forEach(e=>{if(!allEq[e.id]) allEq[e.id] = e})});
  const eqList = Object.values(allEq);
  const eqOpts = eqList.map(eq=>`<option value="${eq.id}"${r.eqId===eq.id?' selected':''}>${eq.id} ${eq.name}</option>`).join('');
  const typeOpts = MH_TYPES.map(t=>`<option${r.type===t?' selected':''}>${t}</option>`).join('');
  const resultOpts = MH_RESULTS.map(t=>`<option${r.result===t?' selected':''}>${t}</option>`).join('');

  let h = `<div class="mh-form-title">${isEdit?'✏️ 보전이력 수정':'+ 보전이력 등록'}<button onclick="closeMaintForm()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)">✕</button></div>`;
  if(r.autoGenerated){
    h += `<div style="background:#dbeafe;color:#1e40af;padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:14px">
      🔄 이 이력은 <b>${r.planYear}년 ${r.planMonth}월 ${r.planWeek==='w2'?'2주':'4주'}차</b> 계획 점검완료로 자동 생성되었습니다.
    </div>`;
  }
  h += `<div class="mh-form-grid">
    <div class="mh-form-field"><label>설비 *</label><select id="mhf_eq" class="mh-input">${eqOpts}</select></div>
    <div class="mh-form-field"><label>보전일자 *</label><input type="date" id="mhf_date" class="mh-input" value="${r.date||new Date().toISOString().slice(0,10)}"></div>
    <div class="mh-form-field"><label>보전유형 *</label><select id="mhf_type" class="mh-input">${typeOpts}</select></div>
    <div class="mh-form-field"><label>결과</label><select id="mhf_result" class="mh-input"><option value="">-- 선택 --</option>${resultOpts}</select></div>
    <div class="mh-form-field"><label>담당자</label><input id="mhf_worker" class="mh-input" value="${r.worker||''}" placeholder="예: 홍길동"></div>
    <div class="mh-form-field"><label>소요시간 (h)</label><input type="number" step="0.5" id="mhf_hours" class="mh-input" value="${r.hours||''}" placeholder="예: 2.5"></div>
  </div>
  <div class="mh-form-field"><label>고장/이상 내용</label><textarea id="mhf_issue" class="mh-input" placeholder="고장 증상, 이상 현상 등">${r.issue||''}</textarea></div>
  <div class="mh-form-field"><label>보전 내용 (조치사항)</label><textarea id="mhf_work" class="mh-input" placeholder="수리 내용, 조치 사항 등">${r.work||''}</textarea></div>
  <div class="mh-form-grid">
    <div class="mh-form-field"><label>교체부품</label><input id="mhf_parts" class="mh-input" value="${r.parts||''}" placeholder="예: 베어링, 실린더, 밸브 등"></div>
    <div class="mh-form-field"><label>비용 (원)</label><input type="number" id="mhf_cost" class="mh-input" value="${r.cost||''}" placeholder="예: 150000"></div>
  </div>
  <div class="mh-form-field"><label>비고</label><input id="mhf_note" class="mh-input" value="${r.note||''}" placeholder="특이사항"></div>
  <div style="display:flex;gap:10px;margin-top:16px;justify-content:flex-end">
    <button onclick="closeMaintForm()" class="btn btn-secondary">취소</button>
    <button onclick="saveMaintForm(${isEdit?r.id:'null'})" class="btn btn-primary">${isEdit?'수정 저장':'등록'}</button>
  </div>`;
  document.getElementById('maintFormBody').innerHTML = h;
  document.getElementById('maintFormModal').style.display = 'flex';
}

function closeMaintForm(){document.getElementById('maintFormModal').style.display='none'}

function saveMaintForm(editId){
  const eqId = document.getElementById('mhf_eq').value;
  const date = document.getElementById('mhf_date').value;
  const type = document.getElementById('mhf_type').value;
  if(!eqId||!date||!type){alert('설비, 보전일자, 보전유형은 필수입니다.');return}

  const data = {
    eqId,date,type,
    issue:document.getElementById('mhf_issue').value,
    work:document.getElementById('mhf_work').value,
    worker:document.getElementById('mhf_worker').value,
    hours:parseFloat(document.getElementById('mhf_hours').value)||0,
    parts:document.getElementById('mhf_parts').value,
    cost:parseInt(document.getElementById('mhf_cost').value)||0,
    result:document.getElementById('mhf_result').value,
    note:document.getElementById('mhf_note').value
  };

  if(editId!==null){
    const idx = maintHistory.findIndex(h=>h.id===editId);
    if(idx>=0){
      const old = maintHistory[idx];
      data.id = editId;
      data.autoGenerated = old.autoGenerated;
      data.planYear = old.planYear;
      data.planMonth = old.planMonth;
      data.planWeek = old.planWeek;
      maintHistory[idx] = data;
    }
  }else{
    data.id = _mhNextId++;
    maintHistory.push(data);
  }
  setHistory(maintHistory);
  closeMaintForm();
  renderMaintHistory();
}

function deleteMaintHistory(id){
  const r = maintHistory.find(h=>h.id===id);
  if(!confirm(`${r?.eqId} (${r?.date}) 보전이력을 삭제하시겠습니까?${r?.autoGenerated?'\n(자동생성 이력입니다. 점검완료 상태는 유지됩니다.)':''}`)) return;
  maintHistory = maintHistory.filter(h=>h.id!==id);
  setHistory(maintHistory);
  if(r?.autoGenerated&&r.planYear){
    const yChecks = getChecks(r.planYear);
    Object.keys(yChecks).forEach(k=>{
      if(yChecks[k].autoHistoryId===id) yChecks[k].autoHistoryId = null;
    });
    setChecks(r.planYear, yChecks);
    if(r.planYear===currentYear) checkData = getChecks(currentYear);
  }
  renderMaintHistory();
  if(currentMainTab==='plan') renderEqTable();
}

function exportMaintHistory(){
  if(typeof XLSX==='undefined'){alert('엑셀 라이브러리 로드 중...');return}
  const rows = maintHistory.map(r=>({
    '설비번호':r.eqId,'설비명':getEqName(r.eqId),'보전일자':r.date,'보전유형':r.type,
    '고장/이상내용':r.issue,'보전내용':r.work,'담당자':r.worker,'소요시간(h)':r.hours,
    '교체부품':r.parts,'비용':r.cost,'결과':r.result,'비고':r.note,
    '자동생성':r.autoGenerated?'Y':'','계획년도':r.planYear||'','계획월':r.planMonth||''
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"보전이력");
  XLSX.writeFile(wb,"보전이력_"+new Date().toISOString().slice(0,10)+".xlsx");
}
