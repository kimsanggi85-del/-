<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>생산계획 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', system-ui, sans-serif; background: #0d0d1a; color: #e0e0e0; min-height: 100vh; font-size: 13px; }
  button, select, input { font-family: inherit; }
  .input-base {
    width: 100%; padding: 8px 10px; background: #0d0d1a;
    border: 1px solid #333; border-radius: 4px; color: #e0e0e0;
    font-size: 13px; outline: none;
  }
  .input-base:focus { border-color: #3b82f6; }
  select.input-base { appearance: none; }
  .btn-primary { padding: 9px 20px; background: #3b82f6; color: #fff; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: .5px; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { padding: 9px 20px; background: #333; color: #ccc; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { background: #444; }
  #modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
  #modal-box { position: relative; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 24px; min-width: 420px; max-width: 560px; max-height: 85vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.5); width: 90%; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 16px; color: #e0e0e0; font-weight: 700; letter-spacing: 1px; }
  .modal-close { background: none; border: none; color: #888; font-size: 20px; cursor: pointer; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; font-weight: 600; letter-spacing: .5px; }
  .color-swatch { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
  .color-swatch.selected { border-color: #fff !important; }
  .tab-btn { padding: 10px 20px; background: none; border: none; color: #666; font-size: 12px; font-weight: 400; cursor: pointer; border-bottom: 2px solid transparent; letter-spacing: .5px; }
  .tab-btn.active { color: #3b82f6; font-weight: 700; border-bottom-color: #3b82f6; }
  .gantt-wrap { overflow-x: auto; border: 1px solid #222; border-radius: 6px; background: #0f0f24; }
  .gantt-inner { display: inline-flex; flex-direction: column; min-width: 100%; }
  .list-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .list-table th { padding: 10px 8px; text-align: left; color: #888; font-weight: 600; border-bottom: 1px solid #222; font-size: 11px; letter-spacing: .5px; white-space: nowrap; background: #13132a; }
  .list-table td { padding: 8px; border-bottom: 1px solid #1a1a30; }
  .list-table tbody tr:hover { background: #1a1a35; }
  .stat-card { background: #13132a; border: 1px solid #222; border-radius: 6px; padding: 10px 16px; min-width: 80px; flex: 0 0 auto; }
  .load-card { background: #13132a; border: 1px solid #222; border-radius: 6px; padding: 16px; }
  .load-bar-bg { height: 20px; background: #0d0d1a; border-radius: 4px; overflow: hidden; position: relative; }
  .load-bar-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } #modal-box { min-width: unset; } }
</style>
</head>
<body>

<div style="background:linear-gradient(135deg,#0d0d1a 0%,#1a1a3e 100%);border-bottom:1px solid #222;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
  <div style="display:flex;align-items:center;gap:14px;">
    <div style="width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;">P</div>
    <div>
      <div style="font-size:17px;font-weight:800;letter-spacing:1.5px;color:#fff;">생산계획 관리</div>
      <div style="font-size:10px;color:#666;letter-spacing:2px;margin-top:2px;">PRODUCTION PLANNING SYSTEM</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <select id="filter-line" class="input-base" style="width:180px;padding:6px 8px;font-size:12px;"></select>
    <select id="filter-status" class="input-base" style="width:100px;padding:6px 8px;font-size:12px;"></select>
    <button class="btn-secondary" style="padding:7px 16px;font-size:12px;" onclick="openLineModal()">⚙ 호기 관리</button>
    <button class="btn-primary" style="padding:7px 16px;font-size:12px;" onclick="openNew()">+ 계획 추가</button>
  </div>
</div>

<div id="stats-bar" style="display:flex;gap:12px;padding:14px 24px;flex-wrap:wrap;"></div>

<div style="display:flex;gap:0;padding:0 24px;border-bottom:1px solid #222;">
  <button class="tab-btn active" data-tab="gantt" onclick="setTab('gantt')">간트 차트</button>
  <button class="tab-btn" data-tab="list" onclick="setTab('list')">목록</button>
  <button class="tab-btn" data-tab="load" onclick="setTab('load')">호기 부하</button>
</div>

<div style="padding:16px 24px;">
  <div id="tab-gantt">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <button class="btn-secondary" onclick="shiftWeek(-1)">◀</button>
      <button class="btn-secondary" style="font-size:11px;" onclick="goToday()">이번주</button>
      <button class="btn-secondary" onclick="shiftWeek(1)">▶</button>
      <span id="week-range" style="font-size:13px;font-weight:600;color:#bbb;margin-left:6px;"></span>
      <select id="view-weeks" class="input-base" style="width:90px;padding:5px 8px;font-size:11px;margin-left:auto;" onchange="setViewWeeks(Number(this.value))">
        <option value="1">1주</option><option value="2" selected>2주</option>
        <option value="3">3주</option><option value="4">4주</option>
      </select>
    </div>
    <div class="gantt-wrap"><div class="gantt-inner" id="gantt-inner"></div></div>
  </div>

  <div id="tab-list" style="display:none;overflow-x:auto;">
    <table class="list-table">
      <thead><tr><th>상태</th><th>작업지시No</th><th>제품명</th><th>수량</th><th>월발주량</th><th>호기</th><th>설비명</th><th>톤수</th><th>시작일</th><th>종료일</th><th>Shift</th><th>비고</th><th></th></tr></thead>
      <tbody id="list-tbody"></tbody>
    </table>
  </div>

  <div id="tab-load" style="display:none;">
    <div style="font-size:12px;color:#888;margin-bottom:12px;" id="load-subtitle"></div>
    <div id="load-content" style="display:flex;flex-direction:column;gap:16px;"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal-backdrop" onclick="closeModal()"></div>
  <div id="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">신규 계획 등록</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>작업지시 No</label><input class="input-base" id="f-orderNo" placeholder="WO-2026-005"/></div>
      <div class="field"><label>제품명</label><input class="input-base" id="f-product" placeholder="제품명"/></div>
      <div class="field"><label>수량</label><input class="input-base" id="f-qty" type="number" placeholder="0"/></div>
      <div class="field"><label>월발주량</label><input class="input-base" id="f-monthlyQty" type="number" placeholder="0"/></div>
      <div class="field"><label>단위</label><select class="input-base" id="f-unit"><option>EA</option><option>SET</option><option>KG</option><option>M</option><option>L</option><option>BOX</option></select></div>
      <div class="field"><label>생산호기</label><select class="input-base" id="f-line"></select></div>
      <div class="field"><label>Shift</label><select class="input-base" id="f-shift"><option>주간</option><option>야간</option><option>24H</option></select></div>
      <div class="field"><label>시작일</label><input class="input-base" id="f-startDate" type="date"/></div>
      <div class="field"><label>종료일</label><input class="input-base" id="f-endDate" type="date"/></div>
      <div class="field"><label>상태</label><select class="input-base" id="f-status"></select></div>
      <div class="field"><label>색상</label><div id="f-colors" style="display:flex;gap:4px;padding-top:4px;flex-wrap:wrap;"></div></div>
    </div>
    <div class="field"><label>비고</label><input class="input-base" id="f-note" placeholder="메모"/></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button id="btn-delete-modal" class="btn-secondary" style="color:#f87171;margin-right:auto;display:none;" onclick="deleteFromModal()">삭제</button>
      <button class="btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn-primary" onclick="saveForm()">저장</button>
    </div>
  </div>
</div>

<div id="line-modal-overlay" style="display:none;position:fixed;inset:0;z-index:1100;align-items:center;justify-content:center;">
  <div style="position:absolute;inset:0;background:rgba(0,0,0,.45);" onclick="closeLineModal()"></div>
  <div style="position:relative;background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:24px;min-width:400px;max-width:620px;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);width:92%;">
    <div class="modal-header">
      <h3 class="modal-title">호기 관리</h3>
      <button class="modal-close" onclick="closeLineModal()">✕</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <input class="input-base" id="new-line-name" placeholder="호기명 (예: 6호기)" style="width:130px;" onkeydown="if(event.key==='Enter')addLine()"/>
      <input class="input-base" id="new-line-equip" placeholder="설비명 (예: 프레스 #6)" style="flex:1;min-width:120px;"/>
      <input class="input-base" id="new-line-tonnage" type="number" placeholder="톤수" style="width:80px;"/>
      <button class="btn-primary" style="padding:8px 16px;white-space:nowrap;" onclick="addLine()">+ 추가</button>
    </div>
    <div style="display:flex;gap:0;padding:6px 12px;margin-bottom:6px;">
      <span style="flex:0 0 100px;font-size:10px;color:#666;font-weight:600;">호기</span>
      <span style="flex:1;font-size:10px;color:#666;font-weight:600;">설비명</span>
      <span style="flex:0 0 70px;font-size:10px;color:#666;font-weight:600;text-align:center;">톤수</span>
      <span style="flex:0 0 50px;font-size:10px;color:#666;font-weight:600;text-align:center;">배정</span>
      <span style="flex:0 0 36px;"></span>
    </div>
    <div id="line-list" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>
</div>

<script>
let LINES = ["1호기","2호기","3호기","4호기","5호기"];
let LINE_INFO = {
  "1호기": {equipment:"프레스 #1", tonnage:200},
  "2호기": {equipment:"프레스 #2", tonnage:150},
  "3호기": {equipment:"프레스 #3", tonnage:300},
  "4호기": {equipment:"프레스 #4", tonnage:110},
  "5호기": {equipment:"프레스 #5", tonnage:80},
};
const STATUS_MAP = {
  planned:    { label:"계획",   color:"#3b82f6", bg:"#dbeafe" },
  confirmed:  { label:"확정",   color:"#059669", bg:"#d1fae5" },
  inProgress: { label:"진행중", color:"#d97706", bg:"#fef3c7" },
  completed:  { label:"완료",   color:"#6b7280", bg:"#f3f4f6" },
  delayed:    { label:"지연",   color:"#dc2626", bg:"#fee2e2" },
};
const COLORS = ["#3b82f6","#059669","#d97706","#8b5cf6","#ec4899","#14b8a6","#f97316","#6366f1","#ef4444","#84cc16"];
const COL_W = 46, ROW_H = 44;

let orders = [
  {id:1,product:"제품A-100",orderNo:"WO-2026-001",qty:5000,monthlyQty:20000,unit:"EA",line:"1호기",startDate:"2026-03-30",endDate:"2026-04-03",shift:"주간",status:"confirmed",note:"긴급",color:0},
  {id:2,product:"제품B-200",orderNo:"WO-2026-002",qty:3000,monthlyQty:12000,unit:"EA",line:"2호기",startDate:"2026-03-31",endDate:"2026-04-04",shift:"주간",status:"planned",note:"",color:1},
  {id:3,product:"제품C-150",orderNo:"WO-2026-003",qty:8000,monthlyQty:30000,unit:"EA",line:"1호기",startDate:"2026-04-06",endDate:"2026-04-10",shift:"24H",status:"planned",note:"고객 납기 04/12",color:2},
  {id:4,product:"제품D-300",orderNo:"WO-2026-004",qty:2000,monthlyQty:8000,unit:"EA",line:"3호기",startDate:"2026-04-01",endDate:"2026-04-03",shift:"야간",status:"planned",note:"",color:3},
];
let nextId = 5, weekStart = getMonday(new Date()), viewWeeks = 2;
let filterLine = "ALL", filterStatus = "ALL", currentTab = "gantt";
let editId = null, selectedColor = 0;

function getMonday(d) {
  const dt = new Date(d), day = dt.getDay();
  dt.setDate(dt.getDate() - day + (day===0?-6:1));
  dt.setHours(0,0,0,0); return dt;
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function fmtShort(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
function dayLabel(d){ return ["일","월","화","수","목","금","토"][new Date(d).getDay()]; }

function getFiltered(){
  return orders.filter(o=>{
    if(filterLine!=="ALL"&&o.line!==filterLine) return false;
    if(filterStatus!=="ALL"&&o.status!==filterStatus) return false;
    return true;
  });
}
function getLineOrders(filtered){
  const map={}; LINES.forEach(l=>map[l]=[]);
  filtered.forEach(o=>{if(map[o.line])map[o.line].push(o);}); return map;
}
function hasConflict(line,lo){
  for(let i=0;i<lo.length;i++) for(let j=i+1;j<lo.length;j++)
    if(lo[i].startDate<lo[j].endDate&&lo[j].startDate<lo[i].endDate) return true;
  return false;
}
function getStats(){
  const total=orders.length, byStatus={}, totalQty=orders.reduce((s,o)=>s+o.qty,0);
  const totalMonthlyQty=orders.reduce((s,o)=>s+(o.monthlyQty||0),0);
  Object.keys(STATUS_MAP).forEach(k=>byStatus[k]=orders.filter(o=>o.status===k).length);
  const totalDays=viewWeeks*7, lineUtil={};
  LINES.forEach(l=>{
    const lo=orders.filter(o=>o.line===l);
    const used=lo.reduce((s,o)=>s+Math.max(1,daysBetween(o.startDate,o.endDate)+1),0);
    lineUtil[l]=Math.min(100,Math.round(used/totalDays*100));
  });
  return {total,byStatus,totalQty,totalMonthlyQty,lineUtil};
}

function initSelects(){
  const fl=document.getElementById("filter-line");
  fl.innerHTML=`<option value="ALL">전체 호기</option>`+LINES.map(l=>{const info=LINE_INFO[l]||{}; return `<option value="${l}">${l}${info.equipment?' ('+info.equipment+')':''}</option>`;}).join("");
  fl.onchange=()=>{filterLine=fl.value;render();};
  const fs=document.getElementById("filter-status");
  fs.innerHTML=`<option value="ALL">전체 상태</option>`+Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("");
  fs.onchange=()=>{filterStatus=fs.value;render();};
  document.getElementById("f-line").innerHTML=LINES.map(l=>{const info=LINE_INFO[l]||{}; return `<option value="${l}">${l}${info.equipment?' - '+info.equipment+(info.tonnage?' '+info.tonnage+'T':''):''}${'</option>'}`; }).join("");
  document.getElementById("f-status").innerHTML=Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("");
  document.getElementById("f-colors").innerHTML=COLORS.map((c,i)=>
    `<div class="color-swatch" id="swatch-${i}" style="background:${c};" onclick="pickColor(${i})"></div>`).join("");
}

function pickColor(i){
  selectedColor=i;
  document.querySelectorAll(".color-swatch").forEach((el,idx)=>el.classList.toggle("selected",idx===i));
}

function shiftWeek(n){ weekStart=addDays(weekStart,n*7); render(); }
function goToday(){ weekStart=getMonday(new Date()); render(); }
function setViewWeeks(n){ viewWeeks=n; render(); }
function setTab(t){
  currentTab=t;
  ["gantt","list","load"].forEach(k=>{
    document.getElementById(`tab-${k}`).style.display=k===t?"block":"none";
  });
  document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===t));
  render();
}

function openNew(){
  editId=null;
  document.getElementById("modal-title").textContent="신규 계획 등록";
  document.getElementById("btn-delete-modal").style.display="none";
  const today=fmt(new Date());
  ["orderNo","product","note"].forEach(id=>document.getElementById("f-"+id).value="");
  document.getElementById("f-qty").value="";
  document.getElementById("f-monthlyQty").value="";
  document.getElementById("f-unit").value="EA";
  document.getElementById("f-line").value=LINES[0];
  document.getElementById("f-shift").value="주간";
  document.getElementById("f-startDate").value=today;
  document.getElementById("f-endDate").value=fmt(addDays(new Date(),4));
  document.getElementById("f-status").value="planned";
  pickColor(orders.length%COLORS.length);
  document.getElementById("modal-overlay").classList.add("open");
}

function openEdit(id){
  const o=orders.find(x=>x.id===id); if(!o) return;
  editId=id;
  document.getElementById("modal-title").textContent="계획 수정";
  document.getElementById("btn-delete-modal").style.display="inline-block";
  document.getElementById("f-orderNo").value=o.orderNo;
  document.getElementById("f-product").value=o.product;
  document.getElementById("f-qty").value=o.qty;
  document.getElementById("f-monthlyQty").value=o.monthlyQty||"";
  document.getElementById("f-unit").value=o.unit;
  document.getElementById("f-line").value=o.line;
  document.getElementById("f-shift").value=o.shift;
  document.getElementById("f-startDate").value=o.startDate;
  document.getElementById("f-endDate").value=o.endDate;
  document.getElementById("f-status").value=o.status;
  document.getElementById("f-note").value=o.note||"";
  pickColor(o.color||0);
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal(){ document.getElementById("modal-overlay").classList.remove("open"); }

function saveForm(){
  const product=document.getElementById("f-product").value.trim();
  const orderNo=document.getElementById("f-orderNo").value.trim();
  const qty=Number(document.getElementById("f-qty").value);
  if(!product||!orderNo||!qty) return;
  const o={product,orderNo,qty,color:selectedColor,
    monthlyQty:Number(document.getElementById("f-monthlyQty").value)||0,
    unit:document.getElementById("f-unit").value,
    line:document.getElementById("f-line").value,
    shift:document.getElementById("f-shift").value,
    startDate:document.getElementById("f-startDate").value,
    endDate:document.getElementById("f-endDate").value,
    status:document.getElementById("f-status").value,
    note:document.getElementById("f-note").value};
  if(editId) orders=orders.map(x=>x.id===editId?{...o,id:editId}:x);
  else orders.push({...o,id:nextId++});
  closeModal(); render();
}

function deleteFromModal(){
  if(editId){ orders=orders.filter(x=>x.id!==editId); closeModal(); render(); }
}
function removeOrder(id){ orders=orders.filter(x=>x.id!==id); render(); }
function duplicateOrder(id){
  const o=orders.find(x=>x.id===id); if(!o) return;
  orders.push({...o,id:nextId++,status:"planned",orderNo:o.orderNo+"-CP"}); render();
}
function statusCycle(id){
  const seq=["planned","confirmed","inProgress","completed","delayed"];
  orders=orders.map(o=>{
    if(o.id!==id) return o;
    return {...o,status:seq[(seq.indexOf(o.status)+1)%seq.length]};
  }); render();
}
function updateMonthlyQty(id,val){
  orders=orders.map(o=>o.id===id?{...o,monthlyQty:val||0}:o);
  renderStats();
}

function render(){
  renderStats();
  if(currentTab==="gantt") renderGantt();
  if(currentTab==="list") renderList();
  if(currentTab==="load") renderLoad();
}

function renderStats(){
  const s=getStats();
  const items=[
    {label:"총 계획",val:s.total,sub:"건"},
    {label:"총 수량",val:s.totalQty.toLocaleString(),sub:"EA"},
    {label:"월발주량",val:s.totalMonthlyQty.toLocaleString(),sub:"EA",color:"#d97706"},
    ...Object.entries(STATUS_MAP).map(([k,v])=>({label:v.label,val:s.byStatus[k],sub:"건",color:v.color})),
  ];
  document.getElementById("stats-bar").innerHTML=items.map(x=>
    `<div class="stat-card">
      <div style="font-size:10px;color:#666;margin-bottom:4px;letter-spacing:.5px;">${x.label}</div>
      <div style="font-size:18px;font-weight:800;color:${x.color||'#fff'};">${x.val}<span style="font-size:10px;color:#666;margin-left:3px;">${x.sub}</span></div>
    </div>`).join("");
}

function renderGantt(){
  const totalDays=viewWeeks*7;
  const days=Array.from({length:totalDays},(_,i)=>addDays(weekStart,i));
  const filtered=getFiltered(), lineOrders=getLineOrders(filtered);
  const todayStr=fmt(new Date());
  document.getElementById("week-range").textContent=`${fmt(weekStart)} ~ ${fmt(addDays(weekStart,totalDays-1))}`;
  let html="";
  // Header
  html+=`<div style="display:flex;position:sticky;top:0;z-index:10;background:#13132a;">`;
  html+=`<div style="width:140px;min-width:140px;height:52px;border-right:1px solid #222;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:center;gap:6px;">
    <span style="font-size:10px;color:#666;font-weight:600;">호기</span>
    <span style="font-size:9px;color:#555;">/ 설비</span>
  </div>`;
  days.forEach(d=>{
    const isToday=fmt(d)===todayStr, dn=d.getDay();
    html+=`<div style="min-width:${COL_W}px;width:${COL_W}px;height:52px;border-right:1px solid #1e1e3a;border-bottom:1px solid #222;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${isToday?'rgba(59,130,246,.15)':'transparent'};">
      <span style="font-size:10px;color:${dn===0?'#f87171':dn===6?'#60a5fa':'#888'};font-weight:600;">${dayLabel(d)}</span>
      <span style="font-size:12px;font-weight:${isToday?800:500};color:${isToday?'#3b82f6':'#bbb'};">${fmtShort(d)}</span>
    </div>`;
  });
  html+=`</div>`;
  // Rows
  LINES.forEach(line=>{
    const lo=lineOrders[line]||[], conflict=hasConflict(line,lo);
    const rowCount=Math.max(1,lo.length), rowH=ROW_H*rowCount;
    html+=`<div style="display:flex;min-height:${rowH}px;">`;
    const info=LINE_INFO[line]||{equipment:"",tonnage:""};
    html+=`<div style="width:140px;min-width:140px;height:${rowH}px;border-right:1px solid #222;border-bottom:1px solid #1e1e3a;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:${conflict?'rgba(220,38,38,.08)':'transparent'};padding:2px 4px;">
      <span style="font-size:11px;font-weight:700;color:${conflict?'#f87171':'#aaa'};letter-spacing:1px;">${line}</span>
      ${info.equipment?`<span style="font-size:9px;color:#666;margin-top:1px;overflow:hidden;text-overflow:ellipsis;max-width:130px;white-space:nowrap;" title="${info.equipment} ${info.tonnage?info.tonnage+'T':''}">${info.equipment}${info.tonnage?' · '+info.tonnage+'T':''}</span>`:''}
      ${conflict?`<span style="font-size:9px;color:#f87171;">⚠ 중복</span>`:''}
    </div>`;
    html+=`<div style="position:relative;flex:1;height:${rowH}px;border-bottom:1px solid #1e1e3a;display:flex;">`;
    days.forEach(d=>{
      const dn=d.getDay(), isToday=fmt(d)===todayStr;
      const bg=isToday?"rgba(59,130,246,.12)":(dn===0||dn===6)?"rgba(255,255,255,.02)":"transparent";
      html+=`<div style="min-width:${COL_W}px;width:${COL_W}px;height:${rowH}px;border-right:1px solid #1e1e3a;background:${bg};"></div>`;
    });
    lo.forEach((o,idx)=>{
      const s=daysBetween(fmt(weekStart),o.startDate), e=daysBetween(fmt(weekStart),o.endDate);
      if(e<0||s>=totalDays) return;
      const left=Math.max(0,s)*COL_W, right=Math.min(totalDays-1,e)*COL_W+COL_W, w=right-left;
      const st=STATUS_MAP[o.status]||STATUS_MAP.planned, c=COLORS[o.color%COLORS.length];
      html+=`<div onclick="openEdit(${o.id})" title="${o.product} | ${o.qty}${o.unit} | 월발주:${(o.monthlyQty||0).toLocaleString()} | ${st.label}"
        onmouseenter="this.style.transform='scaleY(1.08)'" onmouseleave="this.style.transform='scaleY(1)'"
        style="position:absolute;left:${left}px;top:${idx*ROW_H+6}px;width:${w}px;height:${ROW_H-12}px;
          background:linear-gradient(135deg,${c}dd,${c}88);border-radius:4px;cursor:pointer;
          display:flex;align-items:center;padding-left:8px;gap:6px;overflow:hidden;white-space:nowrap;
          border:1px solid ${c};box-shadow:0 2px 8px ${c}33;transition:transform .1s;">
        <span style="font-size:8px;padding:2px 5px;border-radius:3px;background:${st.color};color:#fff;font-weight:700;flex-shrink:0;">${st.label}</span>
        <span style="font-size:11px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;">${o.product}</span>
        ${w>140?`<span style="font-size:10px;color:rgba(255,255,255,.7);">${o.qty.toLocaleString()}</span>`:''}
      </div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById("gantt-inner").innerHTML=html;
}

function renderList(){
  const filtered=getFiltered();
  const tb=document.getElementById("list-tbody");
  if(!filtered.length){ tb.innerHTML=`<tr><td colspan="13" style="padding:30px;text-align:center;color:#666;">데이터 없음</td></tr>`; return; }
  tb.innerHTML=filtered.map(o=>{
    const st=STATUS_MAP[o.status], c=COLORS[o.color%COLORS.length];
    const info=LINE_INFO[o.line]||{equipment:"-",tonnage:"-"};
    return `<tr>
      <td><span onclick="statusCycle(${o.id})" style="font-size:10px;padding:3px 8px;border-radius:3px;cursor:pointer;background:${st.bg};color:${st.color};font-weight:700;">${st.label}</span></td>
      <td style="font-weight:600;color:#ddd;">${o.orderNo}</td>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${c};margin-right:6px;"></span>${o.product}</td>
      <td style="text-align:right;font-weight:600;">${o.qty.toLocaleString()} ${o.unit}</td>
      <td style="text-align:right;"><input type="number" value="${o.monthlyQty||0}" onchange="updateMonthlyQty(${o.id},Number(this.value))" style="width:80px;padding:4px 6px;background:#0d0d1a;border:1px solid #333;border-radius:4px;color:#d97706;font-size:12px;font-weight:600;text-align:right;outline:none;font-family:inherit;" onfocus="this.style.borderColor='#d97706'" onblur="this.style.borderColor='#333'"/></td>
      <td style="color:#999;">${o.line}</td>
      <td style="color:#999;">${info.equipment||"-"}</td>
      <td style="color:#999;text-align:center;">${info.tonnage?info.tonnage+'T':'-'}</td>
      <td>${o.startDate}</td><td>${o.endDate}</td><td>${o.shift}</td>
      <td style="color:#888;max-width:120px;overflow:hidden;text-overflow:ellipsis;">${o.note||"-"}</td>
      <td style="white-space:nowrap;">
        <button onclick="openEdit(${o.id})" style="background:none;border:none;color:#3b82f6;cursor:pointer;font-size:11px;margin-right:6px;">수정</button>
        <button onclick="duplicateOrder(${o.id})" style="background:none;border:none;color:#8b5cf6;cursor:pointer;font-size:11px;margin-right:6px;">복사</button>
        <button onclick="removeOrder(${o.id})" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:11px;">삭제</button>
      </td>
    </tr>`;
  }).join("");
}

function renderLoad(){
  const s=getStats();
  document.getElementById("load-subtitle").textContent=`현재 표시 기간(${viewWeeks}주) 기준 호기별 부하율`;
  document.getElementById("load-content").innerHTML=LINES.map(line=>{
    const util=s.lineUtil[line], lo=orders.filter(o=>o.line===line);
    const totalQty=lo.reduce((s,o)=>s+o.qty,0);
    const barColor=util>90?"#dc2626":util>70?"#d97706":"#3b82f6";
    const chips=lo.map(o=>{
      const st=STATUS_MAP[o.status], c=COLORS[o.color%COLORS.length];
      return `<span style="font-size:10px;padding:3px 8px;border-radius:3px;background:${c}22;color:${c};border:1px solid ${c}44;">${o.product} (${st.label})</span>`;
    }).join("");
    return `<div class="load-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;align-items:center;">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-weight:700;letter-spacing:1px;">${line}</span>
          ${(()=>{const info=LINE_INFO[line]||{}; return info.equipment?`<span style="font-size:11px;color:#888;">${info.equipment}${info.tonnage?' · '+info.tonnage+'T':''}</span>`:'';})()}
        </div>
        <span style="font-size:11px;color:#888;">${lo.length}건 / ${totalQty.toLocaleString()} EA</span>
      </div>
      <div class="load-bar-bg">
        <div class="load-bar-fill" style="width:${util}%;background:linear-gradient(90deg,${barColor},${barColor}99);"></div>
        <span style="position:absolute;right:8px;top:2px;font-size:11px;font-weight:700;color:#fff;">${util}%</span>
      </div>
      <div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;">${chips}</div>
    </div>`;
  }).join("");
}

function openLineModal(){
  document.getElementById("line-modal-overlay").style.display="flex";
  document.getElementById("new-line-name").value="";
  renderLineList();
}
function closeLineModal(){ document.getElementById("line-modal-overlay").style.display="none"; }
function renderLineList(){
  const el=document.getElementById("line-list");
  el.innerHTML=LINES.map((l,i)=>{
    const cnt=orders.filter(o=>o.line===l).length;
    const info=LINE_INFO[l]||{equipment:"",tonnage:""};
    return `<div style="display:flex;align-items:center;gap:0;padding:8px 12px;background:#13132a;border:1px solid #222;border-radius:6px;">
      <span style="flex:0 0 100px;font-size:12px;font-weight:700;color:#ddd;letter-spacing:.5px;">${l}</span>
      <input class="input-base" value="${info.equipment}" placeholder="설비명" onchange="updateLineInfo('${l}','equipment',this.value)" style="flex:1;min-width:100px;padding:5px 8px;font-size:11px;margin-right:6px;"/>
      <input class="input-base" type="number" value="${info.tonnage||''}" placeholder="톤" onchange="updateLineInfo('${l}','tonnage',Number(this.value))" style="flex:0 0 64px;padding:5px 8px;font-size:11px;text-align:center;margin-right:6px;"/>
      <span style="flex:0 0 50px;text-align:center;font-size:10px;color:#666;">${cnt}건</span>
      <button onclick="removeLine(${i})" style="flex:0 0 36px;background:none;border:none;color:${cnt>0?'#444':'#f87171'};cursor:${cnt>0?'not-allowed':'pointer'};font-size:18px;text-align:center;" ${cnt>0?'disabled title="배정된 계획이 있어 삭제 불가"':'title="삭제"'}>✕</button>
    </div>`;
  }).join("");
}
function addLine(){
  const inp=document.getElementById("new-line-name");
  const eqInp=document.getElementById("new-line-equip");
  const tonInp=document.getElementById("new-line-tonnage");
  const name=inp.value.trim().toUpperCase();
  if(!name){ alert("호기명을 입력하세요."); return; }
  if(LINES.includes(name)){ alert("이미 존재하는 호기입니다."); return; }
  LINES.push(name);
  LINE_INFO[name]={equipment:eqInp.value.trim(), tonnage:Number(tonInp.value)||0};
  inp.value=""; eqInp.value=""; tonInp.value="";
  refreshLineSelects();
  renderLineList();
  render();
}
function updateLineInfo(lineName,field,value){
  if(!LINE_INFO[lineName]) LINE_INFO[lineName]={equipment:"",tonnage:0};
  LINE_INFO[lineName][field]=value;
  render();
}
function removeLine(idx){
  const line=LINES[idx];
  if(orders.some(o=>o.line===line)){ alert("해당 호기에 배정된 계획이 있어 삭제할 수 없습니다."); return; }
  if(!confirm(`"${line}" 호기를 삭제하시겠습니까?`)) return;
  LINES.splice(idx,1);
  delete LINE_INFO[line];
  refreshLineSelects();
  renderLineList();
  render();
}
function refreshLineSelects(){
  const fl=document.getElementById("filter-line");
  const curFilter=fl.value;
  fl.innerHTML=`<option value="ALL">전체 호기</option>`+LINES.map(l=>{const info=LINE_INFO[l]||{}; return `<option value="${l}">${l}${info.equipment?' ('+info.equipment+')':''}</option>`;}).join("");
  if(LINES.includes(curFilter)||curFilter==="ALL") fl.value=curFilter; else { fl.value="ALL"; filterLine="ALL"; }
  document.getElementById("f-line").innerHTML=LINES.map(l=>{const info=LINE_INFO[l]||{}; return `<option value="${l}">${l}${info.equipment?' - '+info.equipment+(info.tonnage?' '+info.tonnage+'T':''):''}${'</option>'}`; }).join("");
}

initSelects();
render();
</script>
</body>
</html>
